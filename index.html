<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【未來許願機】夢想狂想文字雲 8.0</title>
    <style>
        /* ========================================================== */
        /* ✨ 策展人專區一：客製化字體載入區 */
        /* 請確保您上傳的 .ttf 檔案與此 html 放在同一個根目錄下 */
        /* ========================================================== */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('StarPandaKidsBeta2.1.ttf') format('truetype'); /* ⚠️ 請確保與您的 ttf 檔名完全一致 */
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 文字雲外殼：畫布底色為純白，圓角化並加上淡紫色立體陰影 */
        .wordcloud-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 480px;
            background: #FFFFFF; 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(169, 156, 199, 0.25);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wordcloud-wrapper">
        <canvas id="cloudCanvas"></canvas>
    </div>

    <script>
        // ===================================================================
        // ✨ 策展人專區二：手動精選回答（固定最大的12個，會依新規則精準斷行）
        // ===================================================================
        const bigWords = [
            "希望在成功湖畔釣到大魚", "微積分一定要歐趴！", "每天都有睡飽8小時", 
            "交到男女朋友", "Logic Pro 神曲產出", "希望能跟校長合照", 
            "被新竹的風吹到免修體育", "腳踏車永遠不被偷", "順利兩年準時畢業", 
            "碩論一次就過關", "梅竹賽清大總錦標", "一定要拿到書卷獎"
        ];

        // ===================================================================
        // ✨ 策展人專區三：背景填充小字
        // ===================================================================
        const smallWordsPool = [
            "歐趴", "天天開心沒煩惱", "實習順利", "錄取竹科", "台積電報到", "聯發科等我", "成功湖", 
            "週末去夜唱", "總圖待一整天", "逛宵夜街", "水木變好吃", "大吃美食", "巨城逛到腳痠", "用九降風放風箏", 
            "畢旅平安", "瀏海不會裂開", "下課時間比上課長", "一直睡覺", "修滿學分", "通通選到", "加簽成功", "專心看書", 
            "梅竹選我", "熱血", "青春", "100分", "大吉", "未來狂想曲", "夢想實現", "E人都揪起來",
            "不迷惘", "加油", "抽中宿舍", "冷氣很涼", "WiFi超快", "早八不遲到","我是I人我驕傲",
            "歐趴糖", "颱風天放假", "賺大錢", "不掉傘", "脫單", "翹課不會被點到"
        ];

        // 🎨 莫蘭迪繽紛色系矩陣
        const colorPalette = [
            "#6A51A3", "#8067B7", "#9A7EC9", "#B39DDB", "#D1C4E9", // 粉紫
            "#1F6596", "#3A82B8", "#60A0D4", "#90CAF9", "#C1E2FF", // 粉藍
            "#D47A2A", "#E69549", "#F5B070", "#FFCC80", "#FFE0B2", // 柔橘
            "#2E6930", "#438A47", "#66BB6A", "#A5D6A7", "#C8E6C9", // 嫩綠
            "#B84A6E", "#D1648A", "#E682A5", "#F48FB1", "#F8BBD0"  // 柔粉
        ];

        const canvas = document.getElementById('cloudCanvas');
        const ctx = canvas.getContext('2d');
        let words = [];
        let activeIndex = -1;
        let highlightProgress = 0;
        let dpr = window.devicePixelRatio || 1;
        let scaleFactor = 1; 

        // 客製化字體與固定標題樣式
        const fontName = "'MyCustomFont', 'Noto Sans TC', sans-serif";
        const titleText = "看看其他人都在許什麼願？";
        const titleColor = "#A39E93"; // 🎨 淺卡其灰

        function initWordCloud() {
            resizeCanvas();
            generateLayout();
            drawLoop();
            
            setInterval(triggerSpotlight, 3800);
            setTimeout(triggerSpotlight, 1500); 
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            dpr = window.devicePixelRatio || 1;
            scaleFactor = rect.width < 500 ? 0.65 : 1.0;

            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        // 🔮 依據新限制進行精準斷行（中文限6字，英文限2個單字）
        function measureWishText(text, size) {
            ctx.save();
            ctx.font = `bold ${size}px ${fontName}`;
            let lines = [];
            
            // 偵測是否含有英文單字（以空格拆分）
            const wordsArr = text.split(' ');
            
            if (wordsArr.length > 2) {
                // 英文超過 2 個單字，強制將前 2 個單字留第一行，其餘留第二行
                const firstLine = wordsArr.slice(0, 2).join(' ');
                const secondLine = wordsArr.slice(2).join(' ');
                lines.push(firstLine);
                lines.push(secondLine);
            } else if (text.length > 6 && !text.includes(' ')) {
                // 純中文且長度超過 6 個字，進行智慧語意斷句
                if (text.includes("成功湖畔")) {
                    lines.push(text.substring(0, 6)); // 希望在成功湖畔 (剛好6字)
                    lines.push(text.substring(6));    // 釣到大魚
                } else if (text.includes("被新竹的風吹到")) {
                    lines.push("被新竹的風吹到"); // (6字)
                    lines.push(text.replace("被新竹的風吹到", ""));
                } else {
                    // 其他中文字词默認切出前 6 個字
                    lines.push(text.substring(0, 6));
                    lines.push(text.substring(6));
                }
            } else {
                lines.push(text);
            }

            let maxWidth = 0;
            lines.forEach(line => {
                const w = ctx.measureText(line).width;
                if (w > maxWidth) maxWidth = w;
            });
            ctx.restore();

            const h = lines.length > 1 ? (size * 1.9) : size;
            return { lines, width: maxWidth + 14, height: h + 10 };
        }

        function generateLayout() {
            words = [];
            const W = canvas.width / dpr;
            const H = canvas.height / dpr;

            // 🔒 建立安全天花板：計算左上角固定標題所佔用的 Y 軸高度範圍
            const titleHeightBoundary = 55 * scaleFactor; 

            // 1. 部署 12 個精選大字
            bigWords.forEach((text, idx) => {
                const baseSize = 38 - (idx * 1.2); // 微調字體使畫面更平衡
                const size = baseSize * scaleFactor; 
                // 將最小限制設定在天花板 (titleHeightBoundary) 之下
                addWordRandomScatter(text, size, true, idx, W * 0.15, W * 0.85, titleHeightBoundary, H * 0.82, 35 * scaleFactor);
            });

            // 2. 部署填充小字
            const maxSmallWords = 60;
            let attempts = 0;
            
            while (words.length < (bigWords.length + maxSmallWords) && attempts < 4000) {
                attempts++;
                const text = smallWordsPool[attempts % smallWordsPool.length];
                const baseSize = 13 + (attempts % 10) + (Math.random() * 0.5);
                const size = baseSize * scaleFactor; 
                
                // 小字同樣限制在天花板之下，不破壞表格排版概念
                if (addWordRandomScatter(text, size, false, attempts, W * 0.05, W * 0.95, titleHeightBoundary, H * 0.94, 10 * scaleFactor)) {
                }
            }
        }

        function addWordRandomScatter(text, size, isHighlight, colorSeed, minX, maxX, minY, maxY, safetyBuffer) {
            const dims = measureWishText(text, size);
            const w = dims.width;
            const h = dims.height;

            const W = canvas.width / dpr;
            const H = canvas.height / dpr;
            
            let localAttempts = 0;
            while (localAttempts < 500) {
                localAttempts++;
                const x = Math.random() * (maxX - minX) + minX;
                const y = Math.random() * (maxY - minY) + minY;

                // 邊界防溢出
                if (x - w/2 < 12 || x + w/2 > W - 12 || y - h/2 < minY || y + h/2 > H - 12) {
                    continue;
                }

                let isOverlapping = false;
                for (let i = 0; i < words.length; i++) {
                    const other = words[i];
                    if (Math.abs(x - other.x) < (w + other.w)/2 + safetyBuffer && Math.abs(y - other.y) < (h + other.h)/2 + safetyBuffer) {
                        isOverlapping = true;
                        break;
                    }
                }

                if (!isOverlapping) {
                    // 長字體與強調節點角度微平，短字體維持最大30度隨機靈動旋轉
                    const maxAngle = (isHighlight || dims.lines.length > 1) ? (3 * Math.PI / 180) : (25 * Math.PI / 180);
                    const rotateAngle = (Math.random() * 2 - 1) * maxAngle;

                    const colorIndex = (colorSeed * 7 + localAttempts) % colorPalette.length;
                    const color = colorPalette[colorIndex];
                    
                    words.push({
                        text: text, lines: dims.lines, baseSize: size, currentSize: size,
                        x: x, y: y, w: w, h: h,
                        color: color, isHighlight: isHighlight,
                        angle: rotateAngle
                    });
                    return true;
                }
            }
            return false;
        }

        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(dpr, dpr); 

            // 📌 繪製左上角固定靜態標題（Word 表格概念，尺寸介於中間值，卡其灰）
            ctx.save();
            const titleSize = 22 * scaleFactor;
            ctx.font = `bold ${titleSize}px ${fontName}`;
            ctx.fillStyle = titleColor;
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.fillText(titleText, 20, 20); // 固定左上角邊距
            ctx.restore();

            // 第一層：普通文字
            words.forEach((word, idx) => {
                if (idx === activeIndex) return; 
                ctx.save();
                ctx.translate(word.x, word.y);
                ctx.rotate(word.angle);

                word.currentSize += (word.baseSize - word.currentSize) * 0.1;
                ctx.fillStyle = word.color;
                ctx.font = `bold ${word.currentSize}px ${fontName}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (word.lines.length > 1) {
                    word.lines.forEach((line, lIdx) => {
                        const offset = (lIdx - (word.lines.length - 1) / 2) * (word.currentSize * 1.25);
                        ctx.fillText(line, 0, offset);
                    });
                } else {
                    ctx.fillText(word.text, 0, 0);
                }
                ctx.restore();
            });

            // 第二層：置頂 🔮 完美圓型聚光燈（Spotlight 效果更明確）
            if (activeIndex !== -1) {
                const word = words[activeIndex];
                ctx.save();
                
                const targetSize = word.baseSize * 1.12; 
                word.currentSize += (targetSize - word.currentSize) * 0.1;
                
                // 🔮 圓形聚光燈半徑計算：取文字方塊對角線，並給予適當內縮緩衝
                const radius = (Math.max(word.w, word.h) * 0.68);
                
                let renderX = word.x;
                let renderY = word.y;
                
                const W = canvas.width / dpr;
                const H = canvas.height / dpr;

                // 🔒 嚴格的圓形視窗防爆框反彈機制
                if (renderX - radius < 15) renderX = radius + 15;
                if (renderX + radius > W - 15) renderX = W - radius - 15;
                if (renderY - radius < 55 * scaleFactor) renderY = radius + 55 * scaleFactor;
                if (renderY + radius > H - 15) renderY = H - radius - 15;

                ctx.translate(renderX, renderY);
                ctx.rotate(word.angle);

                // 畫出明確的「圓形」半透明灰底
                ctx.beginPath();
                ctx.fillStyle = `rgba(95, 95, 95, ${0.78 * highlightProgress})`; 
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.fill();

                // 聚光燈純白字
                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress})`;
                ctx.font = `bold ${word.currentSize}px ${fontName}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (word.lines.length > 1) {
                    word.lines.forEach((line, lIdx) => {
                        const offset = (lIdx - (word.lines.length - 1) / 2) * (word.currentSize * 1.25);
                        ctx.fillText(line, 0, offset);
                    });
                } else {
                    ctx.fillText(word.text, 0, 0);
                }
                ctx.restore();
            }

            ctx.restore();
            requestAnimationFrame(drawLoop);
        }

        function triggerSpotlight() {
            const highlightPool = words.reduce((acc, w, i) => w.isHighlight ? [...acc, i] : acc, []);
            if (highlightPool.length === 0) return;

            let nextIdx;
            do {
                nextIdx = highlightPool[Math.floor(Math.random() * highlightPool.length)];
            } while (nextIdx === activeIndex && highlightPool.length > 1);

            activeIndex = nextIdx;
            highlightProgress = 0;
            
            let fadeIn = setInterval(() => {
                highlightProgress += 0.06;
                if (highlightProgress >= 1) {
                    highlightProgress = 1;
                    clearInterval(fadeIn);
                }
            }, 25);

            setTimeout(() => {
                let fadeOut = setInterval(() => {
                    highlightProgress -= 0.06;
                    if (highlightProgress <= 0) {
                        highlightProgress = 0;
                        activeIndex = -1; 
                        clearInterval(fadeOut);
                    }
                }, 25);
            }, 2300);
        }

        // 監聽圖書館客製化字體完全載入後啟動
        document.fonts.ready.then(() => {
            initWordCloud();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            generateLayout();
        });
    </script>
</body>
</html>
