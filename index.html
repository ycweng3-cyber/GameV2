<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【未來許願機】夢想狂想文字雲 12.0</title>
    <style>
        /* ========================================================== */
        /* ✨ 策展人專區一：客製化字體載入區 */
        /* ========================================================== */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('StarPandaKidsBeta2.1.ttf') format('truetype');
        }

        * { box-sizing: border-box; }
        
        /* 根除雜音防禦機制 */
        html {
            color: transparent;
            font-size: 0;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: initial;
            font-size: 1rem;
        }

        /* 文字雲外殼：稍微加長總高度至 520px，提供更寬裕的垂直散落空間 */
        .wordcloud-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 520px; 
            background: #FFFFFF; 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(169, 156, 199, 0.25);
            overflow: hidden;
        }

        /* 雲朵標題複合區：微調使定位更穩定 */
        .title-cloud-container {
            position: absolute;
            top: -10px;
            left: 5px;
            z-index: 50; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 360px;
            height: 125px;
            transform-origin: top left;
        }

        .title-cloud-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* 🔮 修改：將大標題精準固定錨定在雲朵圖檔的偏底部黃金視覺線 */
        .title-cloud-text {
            position: absolute;
            left: 44.5%;
            top: 59%; /* 稍微下移，使其穩穩落在雲朵底部 */
            transform: translate(-50%, -50%);
            font-family: 'MyCustomFont', 'Noto Sans TC', sans-serif;
            font-weight: bold;
            font-size: 28px; 
            color: #A39E93; 
            white-space: nowrap;
            pointer-events: none; 
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 手機版響應式 RWD 縮放控制 */
        @media (max-width: 500px) {
            .title-cloud-container {
                transform: scale(0.92); 
            }
            .title-cloud-text {
                font-size: 25px; 
            }
        }
    </style>
</head>
<body>

    <div class="wordcloud-wrapper">
        <div class="title-cloud-container">
            <img src="cloud.gif" alt="Cloud Layout">
            <div class="title-cloud-text">看看其他人都在許什麼願？</div>
        </div>
        
        <canvas id="cloudCanvas"></canvas>
    </div>

    <script>
        // ===================================================================
        // ✨ 策展人專區二：手動精選回答（會依【單行不超5字、完整單詞不切斷】智慧斷行）
        // ===================================================================
        const bigWords = [
            "希望在成功湖畔釣到大魚", "微積分一定要歐趴！", "每天都有睡飽8小時", 
            "交到男女朋友", "Logic Pro神曲產出", "希望能跟校長合照", 
            "被新竹的風吹到免修體育", "腳踏車永遠不被偷", "順利兩年準時畢業", 
            "碩論一次就過關", "梅竹賽清大總錦標", "一定要拿到書卷獎"
        ];

        // ===================================================================
        // ✨ 策展人專區三：背景填充小字
        // ===================================================================
        const smallWordsPool = [
            "歐趴", "天天開心沒煩惱", "實習順利", "錄取竹科", "台積電報到", "聯發科等我", "成功湖", 
            "週末去夜唱", "總圖待一整天", "逛宵夜街", "水木變好吃", "大吃美食", "巨城逛到腳痠", "用九降風放風箏", 
            "畢旅平安", "瀏海不會裂開", "下課時間比上課長", "一直睡覺", "修滿學分", "通通選到", "騎貢丸", "專心看書", 
            "梅竹選我", "熱血", "青春", "100分", "大吉", "未來狂想曲", "夢想實現", "E人都揪起來",
            "不迷惘", "加油", "抽中宿舍", "冷氣很涼", "WiFi超快", "早八不遲到","我是I人我驕傲",
            "歐趴糖", "颱風天放假", "賺大錢", "不掉傘", "脫單", "翹課不會被點到","逛新竹動物園"
        ];

        // 🎨 莫蘭迪繽紛色系
        const colorPalette = [
            "#6A51A3", "#8067B7", "#9A7EC9", "#B39DDB", "#D1C4E9", 
            "#1F6596", "#3A82B8", "#60A0D4", "#90CAF9", "#C1E2FF", 
            "#D47A2A", "#E69549", "#F5B070", "#FFCC80", "#FFE0B2", 
            "#2E6930", "#438A47", "#66BB6A", "#A5D6A7", "#C8E6C9", 
            "#B84A6E", "#D1648A", "#E682A5", "#F48FB1", "#F8BBD0"  
        ];

        const canvas = document.getElementById('cloudCanvas');
        const ctx = canvas.getContext('2d');
        let words = [];
        let activeIndex = -1;
        let highlightProgress = 0;
        let dpr = window.devicePixelRatio || 1;
        let scaleFactor = 1; 

        const fontName = "'MyCustomFont', 'Noto Sans TC', sans-serif";

        document.fonts.ready.then(() => {
            initWordCloud();
        });

        function initWordCloud() {
            resizeCanvas();
            generateLayout();
            drawLoop();
            
            setInterval(triggerSpotlight, 3800);
            setTimeout(triggerSpotlight, 1500); 
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            dpr = window.devicePixelRatio || 1;
            scaleFactor = rect.width < 500 ? 0.72 : 1.0;

            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        // 🔮 升級版：清大專屬「全行 5 字上限 x 完整單詞防切斷」多行遞迴語意斷行演算法
        function measureWishText(text, size) {
            ctx.save();
            ctx.font = `bold ${size}px ${fontName}`;
            let lines = [];
            
            // 內建專利核心詞庫：只要跨過5字邊界，強制整包詞提前換行
            const segmentKeywords = ["微積分", "成功湖", "腳踏車", "工程師", "聯發科", "台積電", "歐趴糖", "圖書館", "免修體育", "總錦標", "書卷獎", "男女朋友", "神曲產出"];
            
            // 優先處理英文空格斷句
            const wordsArr = text.split(' ');
            if (wordsArr.length > 2) {
                lines.push(wordsArr.slice(0, 2).join(' '));
                lines.push(wordsArr.slice(2).join(' '));
            } 
            // 中文全面啟用「智慧多行漏斗切片」
            else {
                let remainingText = text;
                
                while (remainingText.length > 0) {
                    // 如果剩餘字數本來就小於等於 5 個字，直接收尾
                    if (remainingText.length <= 5) {
                        lines.push(remainingText);
                        break;
                    }
                    
                    let breakIdx = 5; // 每行最大容許值 5 個字
                    
                    // 掃描是否有關鍵字跨在當前行的第 5 字切點上
                    for (let keyword of segmentKeywords) {
                        const kIdx = remainingText.indexOf(keyword);
                        // 如果關鍵字存在，且起點在前 5 字內，但結尾超過了第 5 字
                        if (kIdx >= 0 && kIdx < 5 && (kIdx + keyword.length) > 5) {
                            breakIdx = kIdx; // 🔒 提前在該單詞前分行，打包丟給下一行
                            break;
                        }
                    }
                    
                    // 防呆機制：如果提前切斷導致這一行變成 0 個字，則強制切 5 個字，避免無窮迴圈
                    if (breakIdx === 0) breakIdx = 5;
                    
                    // 切出這一行的文字，並更新剩餘文字
                    lines.push(remainingText.substring(0, breakIdx));
                    remainingText = remainingText.substring(breakIdx);
                }
            }

            let maxWidth = 0;
            lines.forEach(line => {
                const w = ctx.measureText(line).width;
                if (w > maxWidth) maxWidth = w;
            });
            ctx.restore();

            // 動態計算整體高度：根據最終切出來的總行數給予完美行高
            const h = lines.length > 1 ? (size * (1 + (lines.length - 1) * 0.95)) : size;
            return { lines, width: maxWidth + 14, height: h + 10 };
        }

        function generateLayout() {
            words = [];
            const W = canvas.width / dpr;
            const H = canvas.height / dpr;

            // 🔒 將 Y 軸天花板防撞邊界拓展拉開到 135，給聚光燈絕對安全區
            const titleHeightBoundary = 135 * scaleFactor; 

            // 1. 部署 12 個精選大字
            bigWords.forEach((text, idx) => {
                const baseSize = 42 - (idx * 1.1); 
                const size = baseSize * scaleFactor; 
                addWordRandomScatter(text, size, true, idx, W * 0.16, W * 0.84, titleHeightBoundary, H * 0.82, 36 * scaleFactor);
            });

            // 2. 部署填充小字
            const maxSmallWords = 55; 
            let attempts = 0;
            
            while (words.length < (bigWords.length + maxSmallWords) && attempts < 4000) {
                attempts++;
                const text = smallWordsPool[attempts % smallWordsPool.length];
                const baseSize = 19 + (attempts % 6) + (Math.random() * 0.5);
                const size = baseSize * scaleFactor; 
                
                if (addWordRandomScatter(text, size, false, attempts, W * 0.05, W * 0.95, titleHeightBoundary, H * 0.94, 15 * scaleFactor)) {
                }
            }
        }

        function addWordRandomScatter(text, size, isHighlight, colorSeed, minX, maxX, minY, maxY, safetyBuffer) {
            const dims = measureWishText(text, size);
            const w = dims.width;
            const h = dims.height;

            const W = canvas.width / dpr;
            const H = canvas.height / dpr;
            
            let localAttempts = 0;
            while (localAttempts < 500) {
                localAttempts++;
                const x = Math.random() * (maxX - minX) + minX;
                const y = Math.random() * (maxY - minY) + minY;

                if (x - w/2 < 12 || x + w/2 > W - 12 || y - h/2 < minY || y + h/2 > H - 12) {
                    continue;
                }

                let isOverlapping = false;
                for (let i = 0; i < words.length; i++) {
                    const other = words[i];
                    if (Math.abs(x - other.x) < (w + other.w)/2 + safetyBuffer && Math.abs(y - other.y) < (h + other.h)/2 + safetyBuffer) {
                        isOverlapping = true;
                        break;
                    }
                }

                if (!isOverlapping) {
                    const maxAngle = (isHighlight || dims.lines.length > 1) ? (3 * Math.PI / 180) : (25 * Math.PI / 180);
                    const rotateAngle = (Math.random() * 2 - 1) * maxAngle;

                    const colorIndex = (colorSeed * 7 + localAttempts) % colorPalette.length;
                    const color = colorPalette[colorIndex];
                    
                    words.push({
                        text: text, lines: dims.lines, baseSize: size, currentSize: size,
                        x: x, y: y, w: w, h: h,
                        color: color, isHighlight: isHighlight,
                        angle: rotateAngle
                    });
                    return true;
                }
            }
            return false;
        }

        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(dpr, dpr); 

            // 第一層：普通文字
            words.forEach((word, idx) => {
                if (idx === activeIndex) return; 
                ctx.save();
                ctx.translate(word.x, word.y);
                ctx.rotate(word.angle);

                word.currentSize += (word.baseSize - word.currentSize) * 0.1;
                ctx.fillStyle = word.color;
                ctx.font = `bold ${word.currentSize}px ${fontName}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (word.lines.length > 1) {
                    word.lines.forEach((line, lIdx) => {
                        const offset = (lIdx - (word.lines.length - 1) / 2) * (word.currentSize * 1.25);
                        ctx.fillText(line, 0, offset);
                    });
                } else {
                    ctx.fillText(word.text, 0, 0);
                }
                ctx.restore();
            });

            // 第二層：置頂自適應圓型聚光燈
            if (activeIndex !== -1) {
                const word = words[activeIndex];
                ctx.save();
                
                const targetSize = word.baseSize * 1.12; 
                word.currentSize += (targetSize - word.currentSize) * 0.1;
                
                const textDiagonal = Math.sqrt(word.w * word.w + word.h * word.h);
                const radius = (textDiagonal / 2) + (18 * scaleFactor); 
                
                let renderX = word.x;
                let renderY = word.y;
                
                const W = canvas.width / dpr;
                const H = canvas.height / dpr;

                // 邊界物理反彈：確保灰框不親到頂部雲朵
                if (renderX - radius < 15) renderX = radius + 15;
                if (renderX + radius > W - 15) renderX = W - radius - 15;
                if (renderY - radius < 135 * scaleFactor) renderY = radius + 135 * scaleFactor;
                if (renderY + radius > H - 15) renderY = H - radius - 15;

                ctx.translate(renderX, renderY);
                ctx.rotate(word.angle);

                // 圓形半透明底框
                ctx.beginPath();
                ctx.fillStyle = `rgba(95, 95, 95, ${0.78 * highlightProgress})`; 
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.fill();

                // 聚光燈純白字
                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress})`;
                ctx.font = `bold ${word.currentSize}px ${fontName}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (word.lines.length > 1) {
                    word.lines.forEach((line, lIdx) => {
                        const offset = (lIdx - (word.lines.length - 1) / 2) * (word.currentSize * 1.25);
                        ctx.fillText(line, 0, offset);
                    });
                } else {
                    ctx.fillText(word.text, 0, 0);
                }
                ctx.restore();
            }

            ctx.restore();
            requestAnimationFrame(drawLoop);
        }

        function triggerSpotlight() {
            if (words.length === 0) return;
            
            let nextIdx;
            do {
                nextIdx = Math.floor(Math.random() * words.length);
            } while (nextIdx === activeIndex && words.length > 1);

            activeIndex = nextIdx;
            highlightProgress = 0;
            
            let fadeIn = setInterval(() => {
                highlightProgress += 0.06;
                if (highlightProgress >= 1) {
                    highlightProgress = 1;
                    clearInterval(fadeIn);
                }
            }, 25);

            setTimeout(() => {
                let fadeOut = setInterval(() => {
                    highlightProgress -= 0.06;
                    if (highlightProgress <= 0) {
                        highlightProgress = 0;
                        activeIndex = -1; 
                        clearInterval(fadeOut);
                    }
                }, 25);
            }, 2300);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            generateLayout();
        });
    </script>
</body>
</html>
